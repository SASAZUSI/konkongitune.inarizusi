<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-GENESIS: Card Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap');

        :root {
            --bg-dark: #0a0e14;
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --card-base: #1c252d;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Noto Sans JP', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--neon-blue);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--neon-blue);
            margin-bottom: 30px;
        }

        /* 生成装置の演出 */
        .generator-box {
            position: relative;
            width: 200px;
            height: 200px;
            border: 3px solid var(--neon-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            margin-bottom: 40px;
        }

        .generator-box:hover {
            box-shadow: 0 0 40px var(--neon-blue);
            transform: scale(1.05);
        }

        .generator-box::before {
            content: "GENERATE";
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            color: var(--neon-blue);
        }

        .scanning {
            animation: scan 1.5s infinite linear;
        }

        @keyframes scan {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; border-color: var(--neon-pink); }
            100% { transform: scale(1); opacity: 0.5; }
        }

        /* カードデザイン */
        #card-container {
            perspective: 1000px;
            height: 350px;
            display: none;
        }

        .card {
            width: 240px;
            height: 340px;
            background: var(--card-base);
            border-radius: 15px;
            border: 2px solid #444;
            padding: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            animation: flipIn 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes flipIn {
            0% { transform: rotateY(90deg) scale(0.5); opacity: 0; }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }

        .rarity-badge {
            position: absolute;
            top: 10px; right: 10px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .card-img-area {
            width: 100%;
            height: 160px;
            background: #000;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            margin: 10px 0;
            border: 1px solid #333;
        }

        .card-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 5px 0;
            color: #fff;
        }

        .card-stats {
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.05);
            padding: 10px 0;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
        }

        /* レアリティ効果 */
        .rank-EX { border: 3px solid var(--neon-pink); box-shadow: 0 0 30px var(--neon-pink); }
        .rank-EX .rarity-badge { background: var(--neon-pink); color: #fff; }
        
        /* 履歴 */
        .history {
            margin-top: 50px;
            width: 100%;
            max-width: 500px;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .mini-card {
            background: #1c252d;
            border-radius: 5px;
            padding: 5px;
            text-align: center;
            font-size: 0.7rem;
            border: 1px solid #333;
        }

        button {
            margin-top: 20px;
            background: none;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

    <h1>NEO-GENESIS</h1>
    <div class="subtitle">CELLULAR SPECIMEN COLLECTOR</div>

    <div class="generator-box" id="gen-box" onclick="generateCard()"></div>

    <div id="card-container">
        </div>

    <div class="history">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <span style="font-family:'Orbitron'">LOG: SPECIMENS</span>
            <button onclick="clearLogs()">CLEAR</button>
        </div>
        <div class="history-grid" id="history-grid"></div>
    </div>

    <script>
        const prefixes = ["サイバー", "ヴォイド", "ネオ", "クリスタル", "ダーク", "ルミナス", "プラズマ"];
        const suffixes = ["・ビースト", "・ドロイド", "・ウィング", "・コア", "・レックス", "・アイ"];
        const emojis = ["🐉", "🤖", "🦅", "☄️", "🐺", "👾", "🕸️", "🔋", "💎", "🔥"];
        const rarities = [
            { label: "N", weight: 60 },
            { label: "R", weight: 30 },
            { label: "SR", weight: 8 },
            { label: "EX", weight: 2 }
        ];

        function generateCard() {
            const box = document.getElementById('gen-box');
            const container = document.getElementById('card-container');
            
            if (box.classList.contains('scanning')) return;

            box.classList.add('scanning');
            container.style.display = 'none';

            // 生成シミュレーション（1.5秒）
            setTimeout(() => {
                box.classList.remove('scanning');
                
                // 抽選処理
                const rarity = getRarity();
                const name = prefixes[Math.floor(Math.random()*prefixes.length)] + suffixes[Math.floor(Math.random()*suffixes.length)];
                const emoji = emojis[Math.floor(Math.random()*emojis.length)];
                const hp = Math.floor(Math.random() * 100) + (rarity === 'EX' ? 150 : 50);
                const atk = Math.floor(Math.random() * 50) + (rarity === 'EX' ? 80 : 10);

                // HTML構築
                container.innerHTML = `
                    <div class="card rank-${rarity}">
                        <div class="rarity-badge">${rarity}</div>
                        <div class="card-img-area">${emoji}</div>
                        <div class="card-name">${name}</div>
                        <div class="card-stats">
                            <span>HP ${hp}</span>
                            <span>ATK ${atk}</span>
                        </div>
                    </div>
                `;
                container.style.display = 'block';
                
                addHistory(name, emoji, rarity);
            }, 1500);
        }

        function getRarity() {
            let rand = Math.random() * 100;
            let current = 0;
            for (let r of rarities) {
                current += r.weight;
                if (rand <= current) return r.label;
            }
            return "N";
        }

        function addHistory(name, emoji, rarity) {
            const grid = document.getElementById('history-grid');
            const item = document.createElement('div');
            item.className = 'mini-card';
            if(rarity === 'EX') item.style.borderColor = 'var(--neon-pink)';
            item.innerHTML = `
                <div style="font-size:1.5rem">${emoji}</div>
                <div>${rarity}</div>
            `;
            grid.prepend(item);
        }

        function clearLogs() {
            document.getElementById('history-grid').innerHTML = '';
        }
    </script>
</body>
</html>
