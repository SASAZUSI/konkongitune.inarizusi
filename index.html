<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIECE FIELD - 海賊王への航路</title>
    <style>
        :root {
            --p1-color: #ff4d4d;
            --p2-color: #4d94ff;
            --wood: #3e2723;
        }

        body {
            background: #1a1a1a;
            color: #fff;
            font-family: 'Hiragino Mincho ProN', 'serif';
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            height: 100vh;
        }

        #game-screen {
            width: 100%;
            max-width: 450px;
            height: 100%;
            border: 4px solid var(--wood);
            display: flex;
            flex-direction: column;
            background: url('https://www.transparenttextures.com/patterns/old-map.png'), #d4b483;
            color: #2b1d0e;
        }

        /* プレイヤー情報 */
        .player-info {
            padding: 10px;
            background: rgba(62, 39, 35, 0.9);
            color: #fff;
            text-align: center;
        }

        .active { border: 4px solid #ffd700; box-shadow: 0 0 15px #ffd700; }

        .hp-val { font-size: 1.5rem; font-weight: bold; color: #ffeb3b; }

        /* ログ */
        #log {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.2);
            border-top: 2px solid var(--wood);
            border-bottom: 2px solid var(--wood);
        }

        /* 手札 */
        .hand-container {
            padding: 15px;
            display: flex;
            gap: 8px;
            justify-content: center;
            min-height: 110px;
        }

        .card {
            width: 70px;
            height: 90px;
            background: #fff;
            border: 2px solid #000;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            text-align: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            transition: 0.2s;
        }

        .card:hover { transform: translateY(-10px); }
        .card.atk { background: #ffebee; border-color: #c62828; }
        .card.def { background: #e8f5e9; border-color: #2e7d32; }
        .card.heal { background: #fff3e0; border-color: #ef6c00; }

        .card-icon { font-size: 1.5rem; margin-bottom: 5px; }

        /* オーバーレイ */
        #result {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: #fff;
        }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="p2-area" class="player-info">
            <div>後攻: 🏴‍☠️ 四皇チーム</div>
            <div class="hp-val">฿ <span id="p2-hp">2000</span></div>
        </div>

        <div id="log">冒険の始まりだ！野郎共、準備はいいか！</div>

        <div id="p1-area" class="player-info active">
            <div>先攻: 👒 麦わらチーム</div>
            <div class="hp-val">฿ <span id="p1-hp">2000</span></div>
        </div>

        <div class="hand-container" id="hand"></div>
    </div>

    <div id="result">
        <h1 id="winner-msg"></h1>
        <button onclick="location.reload()" style="padding:10px 20px; font-size:1rem; cursor:pointer;">再戦だぁ！</button>
    </div>

<script>
    let p1Hp = 2000;
    let p2Hp = 2000;
    let turn = 1; // 1 or 2
    let hands = { 1: [], 2: [] };

    const cardPool = [
        { name: "ゴムゴムの銃", icon: "👊", type: "atk", val: 500 },
        { name: "三刀流・鬼斬り", icon: "⚔️", type: "atk", val: 700 },
        { name: "火拳", icon: "🔥", type: "atk", val: 900 },
        { name: "鉄壁の盾", icon: "🛡️", type: "def", val: 500 },
        { name: "覇気ガード", icon: "✨", type: "def", val: 1000 },
        { name: "骨付き肉", icon: "🍖", type: "heal", val: 400 },
        { name: "医者の薬", icon: "💊", type: "heal", val: 600 }
    ];

    function init() {
        for(let i=0; i<4; i++) {
            hands[1].push(drawCard());
            hands[2].push(drawCard());
        }
        updateUI();
    }

    function drawCard() {
        return cardPool[Math.floor(Math.random() * cardPool.length)];
    }

    function updateUI() {
        document.getElementById('p1-hp').innerText = p1Hp;
        document.getElementById('p2-hp').innerText = p2Hp;
        
        const handEl = document.getElementById('hand');
        handEl.innerHTML = '';
        
        hands[turn].forEach((card, idx) => {
            const div = document.createElement('div');
            div.className = `card ${card.type}`;
            div.innerHTML = `<div class="card-icon">${card.icon}</div><div>${card.name}</div><div style="font-size:0.5rem">値:${card.val}</div>`;
            div.onclick = () => playCard(idx);
            handEl.appendChild(div);
        });

        document.getElementById('p1-area').className = turn === 1 ? 'player-info active' : 'player-info';
        document.getElementById('p2-area').className = turn === 2 ? 'player-info active' : 'player-info';

        if(p1Hp <= 0) showResult("四皇チームの勝利！海賊王に一歩近づいた！");
        if(p2Hp <= 0) showResult("麦わらチームの勝利！宴だぁ〜〜！！");
    }

    function playCard(idx) {
        const card = hands[turn][idx];
        const target = turn === 1 ? 2 : 1;
        const log = document.getElementById('log');

        if(card.type === 'atk') {
            addLog(`P${turn}の ${card.name}！`, "#c62828");
            // 簡易防御判定（相手の手札に防御があれば自動使用）
            const defIdx = hands[target].findIndex(c => c.type === 'def');
            if(defIdx !== -1) {
                const defCard = hands[target][defIdx];
                const damage = Math.max(0, card.val - defCard.val);
                addLog(`相手は ${defCard.name} で防いだ！`, "#2e7d32");
                applyDamage(target, damage);
                hands[target].splice(defIdx, 1);
                hands[target].push(drawCard());
            } else {
                applyDamage(target, card.val);
            }
        } else if(card.type === 'heal') {
            addLog(`P${turn}は ${card.name} を食べた！`, "#ef6c00");
            if(turn === 1) p1Hp += card.val; else p2Hp += card.val;
        } else {
            addLog(`P${turn}は防御を捨てて手札を入れ替えた！`);
        }

        hands[turn].splice(idx, 1);
        hands[turn].push(drawCard());
        
        turn = (turn === 1) ? 2 : 1;
        updateUI();
    }

    function applyDamage(t, d) {
        if(t === 1) p1Hp -= d; else p2Hp -= d;
        addLog(`${d} のダメージを与えた！`);
    }

    function addLog(msg, color="#2b1d0e") {
        const log = document.getElementById('log');
        log.innerHTML = `<div style="color:${color}">${msg}</div>` + log.innerHTML;
    }

    function showResult(msg) {
        document.getElementById('result').style.display = 'flex';
        document.getElementById('winner-msg').innerText = msg;
    }

    init();
</script>
</body>
</html>
